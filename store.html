</div>
<script>
(function(){
  function _checkOnline(){
    var bar=document.getElementById('_offline-bar');
    if(!bar) return;
    if(!navigator.onLine){
      bar.style.display='block';
    } else {
      if(bar.style.display!=='none'){
        bar.style.background='rgba(30,40,30,.9)';
        bar.style.color='#4fd1a5';
        bar.innerHTML='<i class="fa-solid fa-wifi" style="margin-left:6px;font-size:11px"></i>عاد الاتصال بالإنترنت';
        setTimeout(function(){ bar.style.display='none'; bar.style.background='rgba(30,30,40,.92)'; bar.style.color='#f7c948'; bar.innerHTML='<i class="fa-solid fa-wifi" style="opacity:.6;margin-left:6px;font-size:11px"></i>لا يوجد اتصال بالإنترنت'; },2500);
      }
    }
  }
  window.addEventListener('online', _checkOnline);
  window.addEventListener('offline', _checkOnline);
  // Check on load
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',_checkOnline);
  else _checkOnline();
})();
</script>

<script>
// ── إظهار اللوجو المحفوظ فوراً في شاشة التحميل ──
(function(){
  try{
    var P=new URLSearchParams(location.search);
    var uid=P.get('uid')||P.get('svcorder');
    var uname=P.get('u');

    // جرّب الـ cache بكل المفاتيح الممكنة
    var cacheKeys=[];
    if(uid)    cacheKeys.push('_store_logo_'+uid);
    if(uname)  cacheKeys.push('_store_logo_u_'+uname.toLowerCase());

    function applyLogo(src){
      var lsLogo=document.getElementById('_ls-logo');
      if(!lsLogo) return;
      lsLogo.className='_has-logo';
      lsLogo.style.cssText='background:transparent;box-shadow:none;border-radius:0;animation:none;width:auto;height:auto;display:flex;align-items:center;justify-content:center';
      lsLogo.innerHTML='<img src="'+src+'" style="max-height:80px;max-width:200px;width:auto;height:auto;object-fit:contain;display:block">';
    }

    // ── Apply cached theme instantly ──
    var themeKey=uid?('_store_theme_'+uid):(uname?('_store_theme_u_'+uname.toLowerCase()):'');
    var cachedTheme=themeKey?localStorage.getItem(themeKey):'';
    if(cachedTheme){
      try{
        var th=JSON.parse(cachedTheme);
        var bg=th.bg||'#f4f5fb';
        var acc=th.accent||'#7c6ff7';
        document.documentElement.style.background=bg;
        document.body.style.background=bg;
        var ls=document.getElementById('_ls');
        if(ls) ls.style.background=bg;
        var lsBar=document.getElementById('_ls-bar');
        if(lsBar) lsBar.style.background=th.isLight?'rgba(0,0,0,.08)':'rgba(255,255,255,.08)';
        var lsFill=document.getElementById('_ls-fill');
        if(lsFill) lsFill.style.background='linear-gradient(90deg,'+acc+','+acc+'aa)';
      }catch(e){}
    }

    // ── Apply cached logo ──
    var found=false;
    for(var i=0;i<cacheKeys.length;i++){
      var cached=localStorage.getItem(cacheKeys[i]);
      if(cached){ applyLogo(cached); found=true; break; }
    }
  }catch(e){}
})();
</script>

// ── unwrap nested Supabase JSON ──
// بيجرب كل مستويات التداخل الممكنة حتى يلاقي services أو settings
function unwrap(raw){
  // parse لو string
  function tryParse(v){
    if(typeof v==='string'){try{return JSON.parse(v);}catch(e){return null;}}
    return v;
  }
  // هل الـ object ده هو الـ studio data؟
  function isStudioData(o){
    if(!o||typeof o!=='object') return false;
    return !!(o.services!==undefined || o.settings!==undefined ||
              o.standalone_packages!==undefined || o.portfolio_projects!==undefined ||
              o.svc_orders!==undefined || o.tasks!==undefined);
  }

  var d=tryParse(raw);
  if(!d) return null;

  // طبقة 1: مباشرة
  if(isStudioData(d)) return d;

  // طبقة 2: d.data
  var d2=tryParse(d.data);
  if(d2 && isStudioData(d2)) return d2;

  // طبقة 3: d.data.data
  if(d2){ var d3=tryParse(d2.data); if(d3&&isStudioData(d3)) return d3; }

  // fallback: رجّع أعمق object فيه settings
  console.warn('[Store] unwrap: could not find studio data in structure, returning raw parsed');
  return d;
}

// ── resolve username to uid ──
async function resolveUname(u){
  if(!u) return null;
  var uLower=u.toLowerCase().trim();

  // محاولة 1: username_index column (الأسرع)
  try{
    var r=await supa.from('studio_data').select('user_id').ilike('username_index',uLower).maybeSingle();
    if(r.data&&r.data.user_id){ console.log('[Store] resolved via username_index'); return r.data.user_id; }
  }catch(e){ console.warn('[Store] username_index lookup failed:',e.message); }

  // محاولة 2: بحث في data JSON نصي (للسجلات القديمة)
  try{
    var r2=await supa.from('studio_data').select('user_id,data').ilike('data','%"username":"'+uLower+'"%').limit(5);
    if(r2.data&&r2.data.length){
      for(var i=0;i<r2.data.length;i++){
        try{
          var d=JSON.parse(r2.data[i].data||'{}');
          var un=(d.settings&&d.settings.username||'').toLowerCase();
          if(un===uLower){ console.log('[Store] resolved via JSON search'); return r2.data[i].user_id; }
          // بحث في stores[] كمان
          if(d.stores&&d.stores.length){
            for(var j=0;j<d.stores.length;j++){
              if((d.stores[j].username||'').toLowerCase()===uLower){
                console.log('[Store] resolved via store username');
                _storeId=d.stores[j].id; // override storeId
                return r2.data[i].user_id;
              }
            }
          }
        }catch(pe){}
      }
    }
  }catch(e){ console.warn('[Store] JSON search failed:',e.message); }

  console.error('[Store] Could not resolve username:',u);
  return null;
}

    var banner=(storeObj&&storeObj.banner)||settings.svc_banner||'';

      '<button class="_cta-btn _cta-main" onclick="_openOrd(\''+encodeURIComponent(s.name)+'\',\'\','+(s.price||0)+',\''+encodeURIComponent(s.payment_link||'')+'\')"><i class="fa-solid fa-paper-plane"></i>اطلب الآن</button>'+

// ── ORDER MODAL ──

  var dp=pn?decodeURIComponent(pn):'';
  var dpl=pl?decodeURIComponent(pl):'';
  var item=ds||dp||'';
  var accent=window._pubAccent||'#7c6ff7';
  var C=window._pubColors||{};
  var userId=window._pubUserId||'';
  var ex=document.getElementById('_ord-ov');if(ex)ex.remove();
  var ov=document.createElement('div');ov.id='_ord-ov';ov.className='_ov';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  ov.innerHTML='<div class="_sheet">'+
    '<div class="_handle"></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
      '<div style="font-size:17px;font-weight:900;color:'+(C.textMain||'#f0f0f5')+'"><i class="fa-solid fa-paper-plane" style="color:'+accent+'"></i> '+(item?'طلب: '+xe(item):'تواصل معنا')+'</div>'+
      '<button onclick="document.getElementById(\'_ord-ov\').remove()" style="background:none;border:1px solid '+(C.borderC||'rgba(255,255,255,.08)')+';width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;color:'+(C.textMain||'#f0f0f5')+'"><i class="fa-solid fa-xmark"></i></button>'+
    '</div>'+
    (dpl?'<a href="'+xe(dpl)+'" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#4fd1a5,#38b28a);color:#fff;text-decoration:none;padding:13px;border-radius:12px;font-family:Cairo,sans-serif;font-size:14px;font-weight:800;margin:12px 0"><i class="fa-solid fa-credit-card"></i>ادفع مباشرة'+(price&&+price?' ('+Number(price).toLocaleString()+' ج.م)':'')+'</a>':'')+
    '<div id="_ord-form">'+
      '<input id="_ord-nm" class="_inp" placeholder="الاسم الكامل *">'+
      '<input id="_ord-ph" class="_inp" placeholder="رقم الواتساب *" type="tel">'+
      '<input id="_ord-em" class="_inp" placeholder="البريد الإلكتروني (اختياري)" type="email" dir="ltr">'+
      '<input id="_ord-sv" class="_inp" value="'+xe(item)+'" placeholder="الخدمة المطلوبة">'+
      '<textarea id="_ord-ds" class="_inp" placeholder="تفاصيل وملاحظات..."></textarea>'+
      '<button class="_submit" onclick="_submitOrd(\''+encodeURIComponent(userId)+'\',\''+encodeURIComponent(ds)+'\',\''+encodeURIComponent(dp)+'\','+(price||0)+',\''+encodeURIComponent(dpl)+'\')"><i class="fa-solid fa-paper-plane"></i>إرسال الطلب</button>'+
    '</div>'+

      '<div style="font-size:12px;color:'+(C.textMuted||'#777799')+';margin-bottom:20px">سنتواصل معك قريباً</div>'+
      '<a class="_portal-link" href="#" style="display:none;align-items:center;gap:8px;background:'+accent+'18;border:1.5px solid '+accent+'44;color:'+accent+';border-radius:11px;padding:11px 18px;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;text-decoration:none"><i class="fa-solid fa-id-card"></i>تابع طلبك من بوابة العميل</a>'+
    '</div>'+
  '</div>';
  document.body.appendChild(ov);

window._submitOrd=function(ue,se,pe,price,ple){
  var uid=decodeURIComponent(ue),sn=decodeURIComponent(se),pn=decodeURIComponent(pe),pl=decodeURIComponent(ple);
  var nm=(document.getElementById('_ord-nm')||{}).value||'';
  var ph=(document.getElementById('_ord-ph')||{}).value||'';
  var em=(document.getElementById('_ord-em')||{}).value||'';
  var sv=(document.getElementById('_ord-sv')||{}).value||sn||pn||'';
  var ds=(document.getElementById('_ord-ds')||{}).value||'';
  if(!nm.trim()||!ph.trim()){
    document.querySelectorAll('._inp')[0].style.borderColor='#f76f7c';
    return;
  }
  var btn=document.querySelector('._submit');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i>جاري الإرسال...';}
  var order={id:Date.now()+'_o',type:'svc_order',client_name:nm,client_phone:ph,client_email:em,service_name:sn||pn||sv||'خدمة',pkg_name:pn||'',price:+price||0,desc:ds,status:'pending',created_at:new Date().toISOString(),read:false};
  var studioPhone=(window._pubSettings&&window._pubSettings.phone)||'';
  var studioName=(window._pubSettings&&window._pubSettings.name)||'Studio';
  var savedClientId=null;

  supa.from('studio_data').select('data').eq('user_id',uid).maybeSingle().then(function(r){
    if(r.data){
      var ud2=null;
      try{ud2=typeof r.data.data==='string'?JSON.parse(r.data.data):r.data.data;}catch(e){}
      if(ud2&&ud2.data&&!ud2.svc_orders){try{ud2=typeof ud2.data==='string'?JSON.parse(ud2.data):ud2.data;}catch(e){}}
      if(ud2){
        // ── تسجيل العميل تلقائياً في قاعدة العملاء ──
        ud2.clients=ud2.clients||[];
        var existingClient=ud2.clients.find(function(c){
          return c.phone===ph||(em&&c.email===em)||c.name===nm;
        });
        if(existingClient){
          savedClientId=String(existingClient.id);
          // تحديث بيانات العميل لو ناقصة
          if(!existingClient.email&&em) existingClient.email=em;
          if(!existingClient.phone&&ph) existingClient.phone=ph;
        } else {
          savedClientId=String(Date.now());
          ud2.clients.push({
            id:savedClientId,
            name:nm,
            phone:ph,
            email:em||'',
            source:'store_order',
            createdAt:new Date().toISOString()
          });
        }
        // ربط الطلب بالعميل
        order.client_id=savedClientId;
        ud2.svc_orders=ud2.svc_orders||[];ud2.svc_orders.push(order);
        ud2._pending_notifications=ud2._pending_notifications||[];
        ud2._pending_notifications.push({id:order.id+'_n',title:'طلب جديد!',body:nm+' — '+(sn||pn||sv),type:'svc_order',created_at:new Date().toISOString(),read:false});
        return supa.from('studio_data').update({data:JSON.stringify(ud2),updated_at:new Date().toISOString()}).eq('user_id',uid);
      }
    }
  }).then(function(){
    var f=document.getElementById('_ord-form');if(f)f.style.display='none';
    var sc=document.getElementById('_ord-succ');if(sc){
      sc.style.display='block';
      // ── تحديث رابط البوابة بعد معرفة client_id ──
      var portalLink=sc.querySelector('._portal-link');
      if(portalLink&&savedClientId){
        var indexUrl=window.location.origin+window.location.pathname.replace(/\/[^\/]*$/,'/index.html');
        var newHref=indexUrl+'?clientportal='+encodeURIComponent(uid)+'&cid='+encodeURIComponent(savedClientId);
        portalLink.href=newHref;
        portalLink.style.display='inline-flex';
      }
    }
    if(studioPhone){
      var txt='مرحباً '+studioName+' 👋\nطلب جديد من: '+nm+'\nالخدمة: '+(sn||pn||sv)+'\nالهاتف: '+ph+(ds?'\nملاحظات: '+ds:'');
      setTimeout(function(){window.open('https://wa.me/'+studioPhone.replace(/\D/g,'')+'?text='+encodeURIComponent(txt),'_blank');},700);
    }
  }).catch(function(){if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i>إرسال الطلب';}});
};

// ── Combo Tabs ──
window._switchComboTab=function(tab){
  // تحديث الـ tab buttons
  ['svc','pkg','pf','all'].forEach(function(t){
    var btn=document.getElementById('_ctab-'+t);
    if(btn) btn.classList.toggle('active', t===tab);
  });
  // إظهار/إخفاء الـ panels
  var panels={svc:'_combo-svc-panel',pkg:'_combo-pkg-panel',pf:'_combo-pf-panel'};
  Object.keys(panels).forEach(function(key){
    var panel=document.getElementById(panels[key]);
    if(panel) panel.style.display = (key===tab) ? 'block' : 'none';
  });
};

window._filterCat=function(cat){
  var grid=document.getElementById('_combo-grid');
  if(!grid) return;
  // تحديث filter buttons
  var cfs=document.querySelectorAll('._cf');
  cfs.forEach(function(b){
    var isCur=(cat===''&&(b.textContent==='الكل'))||(b.textContent===cat);
    b.classList.toggle('on',isCur);
  });
  // فلتر الكروت
  var cards=grid.querySelectorAll('._sc');
  // معرفة الـ active tab
  var activeTab='all';
  ['svc','pkg','all'].forEach(function(t){
    var btn=document.getElementById('_ctab-'+t);
    if(btn&&btn.classList.contains('active')) activeTab=t;
  });
  cards.forEach(function(c){
    var ccat=c.dataset.cat||'';
    var type=c.dataset.type;
    var matchCat = cat==='' || ccat===cat;
    var matchTab = activeTab==='all' || (activeTab==='svc'&&type==='svc') || (activeTab==='pkg'&&type==='pkg');
    c.style.display = (matchCat&&matchTab) ? '' : 'none';
  });
};

})();
