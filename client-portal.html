async function _submitRevisionRequest(taskId){
  const note=(document.getElementById('_revision-note')?.value||'').trim();
  const btn=document.querySelector('#revision-ov button[data-tid]');
  if(btn){btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';btn.disabled=true;}

  try{
    const now=new Date().toISOString();
    // Mark task as revision in local data
    const t=(_ud?.tasks||[]).find(x=>String(x.id)===String(taskId));
    const pt=(_ud?.project_tasks||[]).find(x=>String(x.id)===String(taskId));
    const task=t||pt;
    const taskTitle=task?.title||'مهمة';
    if(task){
      task.status='revision';
      task.done=false;
      task.clientRevisionNote=note;
      task.clientRevisionAt=now;
      task.clientReceived=false;
      task.clientRevisionRequested=true;
    }

    // Push inbox notification to freelancer's data
    const inboxItem={
      id:'rev_'+Date.now(),
      type:'revision',
      taskId:String(taskId),
      taskTitle:taskTitle,
      clientName:_clientName||'عميل',
      clientId:String(_clientId||''),
      note:note,
      createdAt:now,
      read:false,
      status:'pending' // pending | accepted | rejected
    };
    if(!_ud._inbox) _ud._inbox=[];
    _ud._inbox.unshift(inboxItem);

    // Also push to _pending_notifications for bell
    if(!_ud._pending_notifications) _ud._pending_notifications=[];
    _ud._pending_notifications.unshift({
      id:'rev_notif_'+Date.now(),
      type:'revision',
      title:'طلب تعديل من '+(_clientName||'عميل'),
      body:'طلب تعديل على: '+taskTitle+(note?' — "'+note.slice(0,60)+'"':''),
      taskId:String(taskId),
      clientId:String(_clientId||''),
      created_at:now,
      read:false
    });

    // Save to Supabase — always to freelancer's data
    const saveUid=window._resolvedUid||pUid;
    if(saveUid){
      const fresh=JSON.parse(JSON.stringify(_ud));
      await db.from('studio_data').upsert({user_id:saveUid,data:fresh,updated_at:now},{onConflict:'user_id'});
    }

    document.getElementById('revision-ov')?.remove();
    document.getElementById('proj-detail-ov')?.remove();

    // Show success confirmation
    const ok=document.createElement('div');ok.className='overlay';ok.onclick=()=>{ok.remove();document.getElementById('tp-tasks').innerHTML=renderTasks();};
    ok.innerHTML=`<div class="sheet" style="max-height:55vh;text-align:center;padding:40px 20px">
      <div style="font-size:60px;margin-bottom:12px">📝</div>
      <div style="font-size:20px;font-weight:900;color:var(--t1);margin-bottom:8px">تم إرسال طلب التعديل!</div>
      <div style="font-size:13px;color:var(--t3);line-height:1.8">سيتم مراجعة ملاحظاتك من فريق العمل والتواصل معك قريباً.</div>
      ${note?`<div style="margin-top:14px;padding:12px;background:var(--s2);border-radius:10px;font-size:12px;color:var(--t2);text-align:right;border-right:3px solid #f97316">"${xe(note)}"</div>`:''}
      <button onclick="this.closest('.overlay').remove();document.getElementById('tp-tasks').innerHTML=renderTasks();" style="margin-top:20px;background:#f97316;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer">حسناً</button>
    </div>`;
    document.body.appendChild(ok);
  }catch(e){
    console.error('revision error:',e);
    if(btn){btn.innerHTML='حدث خطأ — حاول مجدداً';btn.disabled=false;}
  }
}

// حفظ ملاحظة العميل على مهمة المشروع
async function _submitProjTaskNote(taskId){
  const inp=document.getElementById('proj-task-note-'+taskId);
  const note=(inp?.value||'').trim();
  if(!note) return;

  const pt=(_ud?.project_tasks||[]).find(x=>String(x.id)===String(taskId));
  if(pt){
    pt.clientNote=note;
    pt.clientNoteAt=new Date().toISOString();
    // Also push to inbox
    if(!_ud._inbox) _ud._inbox=[];
    _ud._inbox.unshift({
      id:'note_'+Date.now(),
      type:'note',
      taskId:String(taskId),
      taskTitle:pt.title||'مهمة',
      clientName:_clientName||'عميل',
      clientId:String(_clientId||''),
      note:note,
      createdAt:new Date().toISOString(),
      read:false,
      status:'info'
    });
  }

  const saveUid=window._resolvedUid||pUid;
  if(saveUid){
    const fresh=JSON.parse(JSON.stringify(_ud));
    await db.from('studio_data').upsert({user_id:saveUid,data:fresh,updated_at:new Date().toISOString()},{onConflict:'user_id'});
  }
  if(inp){inp.value='';inp.placeholder='تم إرسال الملاحظة ✓';}
  setTimeout(()=>{if(inp)inp.placeholder='اترك ملاحظة على هذه المهمة...';},2500);
}

      <button onclick="_clientSelectSlot(this,'${xe(s.day+' '+s.from+' - '+s.to)}')"
        style="padding:8px 12px;border-radius:8px;border:1.5px solid ${acc}44;background:transparent;color:var(--t1);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:.15s"
        onmouseover="if(!this.dataset.sel)this.style.background='${acc}18'"
        onmouseout="if(!this.dataset.sel)this.style.background='transparent'">
        ${xe(s.day)} · ${xe(s.from)} - ${xe(s.to)}
      </button>`).join('')}
    </div>
  </div>` : '';

  ov.innerHTML=`<div class="sheet" style="max-height:88vh">
    <div class="sheet-hdl"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:19px;font-weight:900;color:var(--t1)"><i class="fa-solid fa-calendar-days" style="color:${acc}"></i> احجز موعد</div>
        <div style="font-size:11px;color:var(--t3);margin-top:3px">مع فريق ${xe(nm)}</div>
      </div>
      <button onclick="document.getElementById('book-client-ov').remove()" style="background:var(--s2);border:1px solid var(--bd);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--t2)"><i class="fa-solid fa-xmark"></i></button>
    </div>

    ${slotsHtml}

    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px">اسمك</div>
      <input id="_cbook-name" value="${xe(_clientName||'')}" placeholder="الاسم الكامل *" style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none">
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px">رقم الواتساب</div>
      <input id="_cbook-phone" value="${xe(_clientPhone||'')}" placeholder="رقم الواتساب *" type="tel" style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none;direction:ltr;text-align:right">
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px">الوقت المناسب</div>
      <input id="_cbook-time" placeholder="${slots.length?'اختر من الأوقات المتاحة فوق':'الوقت المناسب لك (مثال: الأحد 3م)'}" ${slots.length?'readonly':''}
        style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none">
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px">موضوع الاجتماع</div>
      <textarea id="_cbook-msg" placeholder="موضوع الموعد أو ما تريد مناقشته..." rows="3"
        style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none;resize:none"></textarea>
    </div>
    <button id="_cbook-submit-btn" onclick="_submitClientBooking('${xe(String(saveUid||''))}')"
      style="width:100%;background:linear-gradient(135deg,${acc},${acc}dd);color:#fff;border:none;border-radius:12px;padding:14px;font-family:var(--font);font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
      <i class="fa-solid fa-calendar-days"></i> إرسال طلب الموعد
    </button>
    <div style="text-align:center;font-size:11px;color:var(--t3);margin-top:10px"><i class="fa-solid fa-bell"></i> سيصل طلبك للفريق فوراً وسيتواصلون معك</div>
  </div>`;
  document.body.appendChild(ov);
}

function _clientSelectSlot(btn, slotLabel){
  const wrap=document.getElementById('_client-book-slots');
  if(wrap) wrap.querySelectorAll('button').forEach(b=>{
    b.style.background='transparent'; b.style.borderColor='rgba(124,111,247,.27)'; delete b.dataset.sel;
  });
  const acc=_settings?.accent||'#7c6ff7';
  btn.style.background=acc+'33'; btn.style.borderColor=acc; btn.dataset.sel='1';
  const inp=document.getElementById('_cbook-time'); if(inp) inp.value=slotLabel;
}

async function _submitClientBooking(uid){
  const name=(document.getElementById('_cbook-name')?.value||'').trim();
  const phone=(document.getElementById('_cbook-phone')?.value||'').trim();
  const time=(document.getElementById('_cbook-time')?.value||'').trim();
  const msg=(document.getElementById('_cbook-msg')?.value||'').trim();
  if(!name||!phone){alert('الاسم ورقم الواتساب مطلوبان');return;}

  const btn=document.getElementById('_cbook-submit-btn');
  if(btn){btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';btn.disabled=true;}

  const meeting={
    id:Date.now()+'_m',
    type:'meeting_request',
    client_name:name,
    client_phone:phone,
    client_id:String(_clientId||''),
    preferred_time:time,
    message:msg,
    created_at:new Date().toISOString(),
    read:false
  };

  try{
    const {data:row}=await db.from('studio_data').select('data').eq('user_id',uid).maybeSingle();
    let fresh=row?.data;
    if(typeof fresh==='string') fresh=JSON.parse(fresh);
    if(fresh?.data&&!fresh?.tasks) fresh=typeof fresh.data==='string'?JSON.parse(fresh.data):fresh.data;

    if(!fresh.support_msgs) fresh.support_msgs=[];
    fresh.support_msgs.push(meeting);
    if(!fresh._pending_notifications) fresh._pending_notifications=[];
    fresh._pending_notifications.push({
      id:meeting.id+'_n',
      title:'<i class="fa-solid fa-calendar-days"></i> طلب موعد ميتنج!',
      body:'طلب من '+name+(time?' — '+time:''),
      type:'meeting',
      created_at:new Date().toISOString(),
      read:false
    });

    await db.from('studio_data').upsert({user_id:uid,data:fresh,updated_at:new Date().toISOString()},{onConflict:'user_id'});

    document.getElementById('book-client-ov')?.remove();

    // رسالة نجاح
    const ok=document.createElement('div');ok.className='overlay';ok.onclick=()=>ok.remove();
    ok.innerHTML=`<div class="sheet" style="max-height:55vh;text-align:center;padding:40px 20px">
      <div style="font-size:60px;margin-bottom:12px">🎉</div>
      <div style="font-size:20px;font-weight:900;color:var(--t1);margin-bottom:8px">تم إرسال طلب الموعد!</div>
      <div style="font-size:13px;color:var(--t3);line-height:1.8">سيتواصل معك الفريق قريباً لتأكيد الموعد.</div>
      ${time?`<div style="margin-top:12px;padding:10px;background:var(--s2);border-radius:10px;font-size:12px;font-weight:700;color:var(--ac)"><i class="fa-solid fa-clock"></i> ${xe(time)}</div>`:''}
      <button onclick="this.closest('.overlay').remove()" style="margin-top:20px;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer">حسناً ✓</button>
    </div>`;
    document.body.appendChild(ok);
  }catch(e){
    console.error('booking error:',e);
    if(btn){btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> إرسال طلب الموعد';btn.disabled=false;}
    alert('حدث خطأ، حاول مجدداً');
  }
}

document.addEventListener('DOMContentLoaded',boot);
</script>
</body>
</html>
