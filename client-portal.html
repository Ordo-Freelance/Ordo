<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة العميل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#7c6ff7;--ac2:#a89cff;--bg:#0a0a0f;--s1:#111118;--s2:#16161f;--s3:#1e1e2c;--bd:rgba(255,255,255,.08);--t1:#f0f0f5;--t2:#c0c0d5;--t3:#888899;--g:#4fd1a5;--y:#f7c948;--r:#ff6b6b;--font:'Cairo',sans-serif}
html,body{min-height:100vh;overflow-x:hidden;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--t1);direction:rtl;line-height:1.6}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(124,111,247,.1) 0%,transparent 60%)}
/* LOADING */
#ls{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ll{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;animation:lp 1.6s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(124,111,247,.4)}50%{transform:scale(1.07);box-shadow:0 0 0 14px rgba(124,111,247,0)}}
.lbar{width:120px;height:3px;background:var(--s3);border-radius:3px;overflow:hidden}
.lbarf{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));animation:lb 1.8s ease-in-out infinite}
@keyframes lb{0%{width:0;margin-right:100%}50%{width:60%;margin-right:0}100%{width:0;margin-right:0}}
/* ERROR */
#er{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:14px;position:relative;z-index:1}
/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);padding:0 20px}
.nav-in{max-width:860px;margin:0 auto;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.nav-ico{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;overflow:hidden;flex-shrink:0}
.nav-ico img{width:100%;height:100%;object-fit:cover}
.nav-nm{font-size:15px;font-weight:800;color:var(--t1)}
.nav-sub{font-size:10px;color:var(--t3)}
.nav-wa{display:flex;align-items:center;gap:6px;background:#25D366;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;text-decoration:none;transition:.15s;white-space:nowrap;flex-shrink:0}
.nav-wa:hover{opacity:.88}
/* WRAP */
.wrap{max-width:860px;margin:0 auto;padding:20px 20px 80px;position:relative;z-index:1}
@media(max-width:600px){.wrap{padding:14px 12px 60px}}
/* WELCOME */
.welcome{background:var(--s1);border:1.5px solid var(--bd);border-radius:18px;padding:22px;margin-bottom:16px;border-right:4px solid var(--ac);position:relative;overflow:hidden}
.welcome::before{content:'';position:absolute;top:-30px;left:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,247,.08),transparent);pointer-events:none}
.wlc-name{font-size:22px;font-weight:900;margin-bottom:4px}
.wlc-svc{font-size:13px;color:var(--t3);margin-bottom:10px}
.wlc-meta{display:flex;gap:10px;flex-wrap:wrap}
.wlc-tag{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3)}
.wlc-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--t3)}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-family:var(--font);font-size:13px;font-weight:700;color:var(--t3);background:none;border:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab-panel{display:none}
.tab-panel.on{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* CARDS */
.card{background:var(--s1);border:1.5px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;transition:border-color .15s}
.card:hover{border-color:rgba(124,111,247,.3)}
.card-ttl{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:6px}
.card-sub{font-size:12px;color:var(--t3);line-height:1.6}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.badge-pend{background:rgba(247,201,72,.15);color:var(--y)}
.badge-prog{background:rgba(124,111,247,.15);color:var(--ac)}
.badge-done{background:rgba(79,209,165,.15);color:var(--g)}
.badge-stop{background:rgba(255,107,107,.12);color:var(--r)}
/* PROGRESS */
.prog-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin:10px 0 6px}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease}
/* TASK DETAIL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--s1);border-radius:20px 20px 0 0;max-width:860px;width:100%;max-height:90vh;overflow-y:auto;padding:22px 20px 40px;animation:shUp .28s ease}
@media(min-width:640px){.overlay{align-items:center;padding:20px}.sheet{border-radius:20px;border:1.5px solid var(--bd);max-height:86vh}}
@keyframes shUp{from{transform:translateY(50px);opacity:0}to{transform:none;opacity:1}}
.sheet-hdl{width:34px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 18px}
@media(min-width:640px){.sheet-hdl{display:none}}
/* INVOICE */
.inv-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.inv-ico{width:38px;height:38px;border-radius:10px;background:rgba(124,111,247,.12);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ac);flex-shrink:0}
.inv-info{flex:1;overflow:hidden}
.inv-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-date{font-size:11px;color:var(--t3)}
.inv-amount{font-size:15px;font-weight:900;color:var(--ac);text-align:left;white-space:nowrap}
/* STEPS */
.step{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px}
.step:last-child{border-bottom:none}
.step-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-top:1px}
.step-dot.done{background:var(--g);border-color:var(--g);color:#fff}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty i{font-size:40px;opacity:.35;display:block;margin-bottom:12px}
/* FOOTER */
.ftr{border-top:1px solid var(--bd);padding:20px;margin-top:30px;position:relative;z-index:1}
.ftr-in{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--t3)}
.ftr-pw{display:flex;align-items:center;gap:7px}
.ftr-try{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border:none;border-radius:6px;padding:4px 10px;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;text-decoration:none;transition:.15s}
/* LIGHT MODE */
body.lm{--bg:#f4f5fb;--s1:#fff;--s2:#f0f1f8;--s3:#e8e9f2;--bd:rgba(0,0,0,.08);--t1:#1a1a2e;--t2:#444466;--t3:#888899}
body.lm .nav{background:rgba(244,245,251,.92)}
body.lm .sheet{background:var(--s1)}
</style>
</head>
<body>
<div id="ls"><div class="ll"><i class="fa-solid fa-gauge"></i></div><div class="lbar"><div class="lbarf"></div></div><div style="font-size:12px;color:var(--t3)">جاري تحميل لوحتك...</div></div>
<div id="er"><div style="font-size:48px;opacity:.4">⚠️</div><div style="font-size:18px;font-weight:800;color:var(--t2)">لا يمكن تحميل لوحة التحكم</div><div style="font-size:13px;color:var(--t3);max-width:300px;line-height:1.7" id="er-msg">تأكد من صحة الرابط</div></div>
<div id="root" style="display:none"></div>

<script>
const SUPA_URL='https://mpfmcjgigpvdxbhgzufo.supabase.co';
const SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZm1jamdpZ3B2ZHhiaGd6dWZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjc3MzMsImV4cCI6MjA4ODIwMzczM30.fICNxH_7DEBHripIoyMcUugTnd4JEBx-ypegpPvb6PM';
const ORDO_HOME='https://ordo.app';
// ← رابط صفحة المتجر (للرجوع)
const STORE_URL='./store.html';

const db=supabase.createClient(SUPA_URL,SUPA_ANON);
const xe=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function hideLs(){const l=document.getElementById('ls');l.style.opacity='0';l.style.transition='opacity .4s';setTimeout(()=>{l.style.display='none'},400);document.getElementById('root').style.display='block';}
function showErr(m){document.getElementById('ls').style.display='none';const er=document.getElementById('er');er.style.display='flex';if(m)document.getElementById('er-msg').textContent=m;}

const P=new URLSearchParams(location.search);
const pUid=P.get('uid'),pOrderId=P.get('order'),pName=P.get('name')||'',pPhone=P.get('phone')||'';
let _ud,_settings,_clientName,_clientPhone,_clientTasks,_clientInvoices,_clientOrders;

async function boot(){
  if(!pUid){showErr('رابط غير صحيح — يجب أن يحتوي على uid');return;}
  try{
    const{data:row,error}=await db.from('studio_data').select('data').eq('user_id',pUid).maybeSingle();
    if(error||!row){showErr('لا يمكن تحميل البيانات');return;}
    let ud;
    try{const raw=row.data;ud=typeof raw==='string'?JSON.parse(raw):raw;if(ud?.data&&typeof ud.services==='undefined'){ud=typeof ud.data==='string'?JSON.parse(ud.data):ud.data;}}catch(e){showErr('خطأ في قراءة البيانات');return;}
    if(!ud){showErr('بيانات فارغة');return;}
    _ud=ud;_settings=ud.settings||{};
    const accent=_settings.accent||_settings.accentColor||'#7c6ff7';
    if((_settings.displayMode||_settings.display_mode||'dark')==='light')document.body.classList.add('lm');
    document.documentElement.style.setProperty('--ac',accent);

    // Identify client from order or URL params
    _clientName=pName;_clientPhone=pPhone;
    if(pOrderId){
      const ord=(ud.svc_orders||[]).find(o=>o.id===pOrderId);
      if(ord){_clientName=_clientName||ord.client_name;_clientPhone=_clientPhone||ord.client_phone;}
    }
    if(!_clientName){showErr('لم يتم التعرف على العميل. تأكد من الرابط.');return;}

    // Get all client data
    const cn=_clientName.trim().toLowerCase();
    const cp=_clientPhone.replace(/\D/g,'');
    _clientOrders=(ud.svc_orders||[]).filter(o=>{
      const mn=o.client_name?.trim().toLowerCase()===cn;
      const mp=cp&&o.client_phone?.replace(/\D/g,'')===cp;
      return mn||mp;
    });
    _clientTasks=(ud.tasks||[]).filter(t=>{
      if(!t)return false;
      const mn=t.client?.trim().toLowerCase()===cn;
      const mp=cp&&(t.clientPhone||t.client_phone||'').replace(/\D/g,'')===cp;
      const mo=pOrderId&&t.source_order_id===pOrderId;
      return mn||mp||mo;
    });
    _clientInvoices=(ud.invoices||[]).filter(inv=>{
      const mn=inv.client?.trim().toLowerCase()===cn;
      const mp=cp&&(inv.clientPhone||inv.client_phone||'').replace(/\D/g,'')===cp;
      return mn||mp;
    });

    renderPage();
    hideLs();
  }catch(e){console.error(e);showErr('حدث خطأ غير متوقع');}
}

function renderPage(){
  const s=_settings;const nm=s.name||'Studio';const logo=s.logo||'';const phone=s.phone||'';
  const accent=s.accent||'#7c6ff7';
  const latestOrder=_clientOrders.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
  const svcName=latestOrder?.service_name||latestOrder?.pkg_name||'خدمة';
  const orderDate=latestOrder?new Date(latestOrder.created_at).toLocaleDateString('ar-EG'):'—';
  const statusColors={pending:'badge-pend',قيد_التنفيذ:'badge-prog','قيد التنفيذ':'badge-prog',active:'badge-prog',done:'badge-done',مكتملة:'badge-done',stopped:'badge-stop',موقوفة:'badge-stop'};
  function badgeCls(st){return statusColors[st]||'badge-prog';}
  function statusLabel(st){const m={'pending':'قيد المراجعة','active':'قيد التنفيذ','done':'مكتملة','stopped':'موقوفة'};return m[st]||st||'نشط';}

  // Stats
  const active=_clientTasks.filter(t=>t.status!=='مكتملة'&&t.status!=='موقوفة').length;
  const done=_clientTasks.filter(t=>t.status==='مكتملة').length;
  const totalInv=_clientInvoices.reduce((s,i)=>s+(+i.total||0),0);
  const paidInv=_clientInvoices.filter(i=>i.paid||i.status==='مدفوعة').reduce((s,i)=>s+(+i.total||0),0);
  const unpaid=Math.max(0,totalInv-paidInv);

  const lo=logo?`<div class="nav-ico"><img src="${xe(logo)}" alt=""></div>`:`<div class="nav-ico">${(nm||'S').charAt(0)}</div>`;

  document.getElementById('root').innerHTML=`
  <nav class="nav"><div class="nav-in">
    <a class="nav-brand" href="${xe(STORE_URL+'?uid='+pUid)}">${lo}<div><div class="nav-nm">${xe(nm)}</div><div class="nav-sub">بوابة العميل</div></div></a>
    ${phone?`<a href="https://wa.me/${phone.replace(/\D/g,'')}?text=${encodeURIComponent('مرحباً '+nm)}" target="_blank" class="nav-wa"><i class="fa-brands fa-whatsapp"></i>تواصل</a>`:''}
  </div></nav>

  <div class="wrap">
    <!-- WELCOME -->
    <div class="welcome">
      <div class="wlc-name">مرحباً، ${xe(_clientName)} 👋</div>
      <div class="wlc-svc">${xe(svcName)}</div>
      <div class="wlc-meta">
        <div class="wlc-tag"><i class="fa-solid fa-calendar-days"></i> تاريخ الطلب: ${orderDate}</div>
        <div class="wlc-badge badge-prog" style="background:rgba(124,111,247,.12);color:var(--ac)">● نشط</div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat"><div class="stat-val" style="color:var(--ac)">${active}</div><div class="stat-lbl">مشاريع نشطة</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--g)">${done}</div><div class="stat-lbl">مكتملة</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--y)">${totalInv?totalInv.toLocaleString()+' ج':'—'}</div><div class="stat-lbl">إجمالي الفواتير</div></div>
      <div class="stat"><div class="stat-val" style="color:${unpaid>0?'var(--r)':'var(--g)'}">${unpaid?unpaid.toLocaleString()+' ج':'—'}</div><div class="stat-lbl">غير مدفوع</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs">
      <button class="tab on" onclick="switchTab('orders')" id="tab-orders"><i class="fa-solid fa-inbox"></i>طلباتي (${_clientOrders.length})</button>
      <button class="tab" onclick="switchTab('tasks')" id="tab-tasks"><i class="fa-solid fa-clipboard-list"></i>المشاريع (${_clientTasks.length})</button>
      <button class="tab" onclick="switchTab('invoices')" id="tab-invoices"><i class="fa-solid fa-file-invoice"></i>الفواتير (${_clientInvoices.length})</button>
    </div>

    <!-- ORDERS PANEL -->
    <div class="tab-panel on" id="tp-orders">${renderOrders()}</div>
    <!-- TASKS PANEL -->
    <div class="tab-panel" id="tp-tasks">${renderTasks()}</div>
    <!-- INVOICES PANEL -->
    <div class="tab-panel" id="tp-invoices">${renderInvoices()}</div>
  </div>

  <footer class="ftr"><div class="ftr-in">
    <span>© ${new Date().getFullYear()} ${xe(nm)}</span>
    <div class="ftr-pw"><span>مدعوم من</span><span style="font-size:11px;font-weight:900;color:var(--ac)">⚡ Ordo</span><a href="${ORDO_HOME}" target="_blank" class="ftr-try"><i class="fa-solid fa-bolt"></i>جرّب الآن</a></div>
  </div></footer>`;
}

function renderOrders(){
  if(!_clientOrders.length)return`<div class="empty"><i class="fa-solid fa-inbox"></i><div style="font-size:14px;font-weight:700;color:var(--t2);margin-bottom:5px">لا توجد طلبات بعد</div></div>`;
  const sc={'pending':'badge-pend','active':'badge-prog','done':'badge-done','stopped':'badge-stop'};
  const sl={'pending':'قيد المراجعة','active':'قيد التنفيذ','done':'مكتملة','stopped':'موقوفة'};
  return _clientOrders.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map(o=>`
    <div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap">
        <div>
          <div class="card-ttl">${xe(o.service_name||o.pkg_name||'خدمة')}</div>
          ${o.pkg_name&&o.pkg_name!==o.service_name?`<div style="font-size:11px;color:var(--ac);margin-top:2px"><i class="fa-solid fa-box"></i> ${xe(o.pkg_name)}</div>`:''}
        </div>
        <span class="badge ${sc[o.status]||'badge-pend'}">${sl[o.status]||xe(o.status)||'قيد المراجعة'}</span>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--t3)">
        ${o.price?`<span><i class="fa-solid fa-coins"></i> ${Number(o.price).toLocaleString()} ج.م</span>`:''}
        <span><i class="fa-solid fa-calendar-days"></i> ${new Date(o.created_at).toLocaleDateString('ar-EG')}</span>
      </div>
      ${o.desc?`<div style="font-size:12px;color:var(--t3);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);line-height:1.65">${xe(o.desc)}</div>`:''}
    </div>`).join('');
}

function renderTasks(){
  if(!_clientTasks.length)return`<div class="empty"><i class="fa-solid fa-clipboard-list"></i><div style="font-size:14px;font-weight:700;color:var(--t2);margin-bottom:5px">لا توجد مشاريع مرتبطة بعد</div><div>سيتم إضافة مشاريعك هنا عند بدء العمل</div></div>`;
  const sc={مكتملة:'badge-done','قيد التنفيذ':'badge-prog',موقوفة:'badge-stop',جديد:'badge-pend'};
  return _clientTasks.map(t=>{
    const steps=t.steps||[];
    const done=steps.filter(s=>s.done).length;
    const prog=steps.length?Math.round(done/steps.length*100):(t.done?100:0);
    const sc2=sc[t.status]||'badge-prog';
    return`<div class="card" style="cursor:pointer" onclick="openTask('${xe(String(t.id))}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap">
        <div class="card-ttl">${xe(t.title||t.name||'مشروع')}</div>
        <span class="badge ${sc2}">${xe(t.status||'—')}</span>
      </div>
      ${t.desc?`<div class="card-sub" style="-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden">${xe(t.desc)}</div>`:''}
      <div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:var(--ac)"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3)">
        <span>${prog}% مكتمل</span>
        ${t.deadline?`<span><i class="fa-solid fa-calendar-days"></i> ${xe(t.deadline)}</span>`:''}
        <span style="color:var(--ac);font-weight:700">عرض ↗</span>
      </div>
    </div>`;
  }).join('');
}

function renderInvoices(){
  if(!_clientInvoices.length)return`<div class="empty"><i class="fa-solid fa-file-invoice"></i><div style="font-size:14px;font-weight:700;color:var(--t2);margin-bottom:5px">لا توجد فواتير بعد</div><div>ستظهر فواتيرك هنا عند إصدارها</div></div>`;
  return _clientInvoices.sort((a,b)=>new Date(b.date||b.created_at||0)-new Date(a.date||a.created_at||0)).map(inv=>{
    const paid=inv.paid||inv.status==='مدفوعة';
    return`<div class="inv-card">
      <div class="inv-ico"><i class="fa-solid fa-file-invoice-dollar"></i></div>
      <div class="inv-info">
        <div class="inv-name">${xe(inv.title||inv.subject||inv.description||'فاتورة')}</div>
        <div class="inv-date">${inv.date||inv.created_at?new Date(inv.date||inv.created_at).toLocaleDateString('ar-EG'):''}</div>
        <span class="badge ${paid?'badge-done':'badge-pend'}" style="margin-top:4px">${paid?'✅ مدفوعة':'⏳ غير مدفوعة'}</span>
      </div>
      <div class="inv-amount">${inv.total?Number(inv.total).toLocaleString()+' ج':'—'}</div>
    </div>`;
  }).join('');
}

// ── TASK DETAIL ──
function openTask(taskId){
  const t=(_ud?.tasks||[]).find(x=>String(x.id)===String(taskId));
  if(!t)return;
  const steps=t.steps||[];
  const done=steps.filter(s=>s.done).length;
  const prog=steps.length?Math.round(done/steps.length*100):(t.done?100:0);
  const sc={مكتملة:'badge-done','قيد التنفيذ':'badge-prog',موقوفة:'badge-stop',جديد:'badge-pend'};
  const acc=_settings?.accent||'#7c6ff7';
  const ov=document.createElement('div');ov.className='overlay';ov.id='task-ov';
  ov.onclick=ev=>{if(ev.target===ov)ov.remove();};
  ov.innerHTML=`<div class="sheet">
    <div class="sheet-hdl"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div>
        <div style="font-size:18px;font-weight:900">${xe(t.title||'مشروع')}</div>
        <span class="badge ${sc[t.status]||'badge-prog'}" style="margin-top:5px">${xe(t.status||'—')}</span>
      </div>
      <button onclick="document.getElementById('task-ov').remove()" style="background:var(--s2);border:1px solid var(--bd);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--t2)"><i class="fa-solid fa-xmark"></i></button>
    </div>
    ${t.desc?`<div style="font-size:13px;color:var(--t2);line-height:1.8;padding:14px;background:var(--s2);border-radius:12px;margin-bottom:18px">${xe(t.desc)}</div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:13px;font-weight:700;color:var(--t3)">التقدم العام</div>
      <div style="font-size:22px;font-weight:900;color:${acc}">${prog}%</div>
    </div>
    <div style="height:12px;background:var(--s3);border-radius:8px;overflow:hidden;margin-bottom:20px"><div style="height:100%;width:${prog}%;background:${acc};transition:width .6s ease;border-radius:8px"></div></div>
    ${t.deadline?`<div style="font-size:12px;color:var(--t3);margin-bottom:16px"><i class="fa-solid fa-calendar-days" style="color:${acc}"></i> موعد التسليم: <b style="color:var(--t2)">${xe(t.deadline)}</b></div>`:''}
    ${steps.length?`<div style="font-size:12px;font-weight:800;color:var(--t3);margin-bottom:10px"><i class="fa-solid fa-list-check"></i> خطوات المشروع (${done}/${steps.length})</div>`+
    steps.map(s=>`<div class="step">
      <div class="step-dot ${s.done?'done':''}">${s.done?'<i class="fa-solid fa-check"></i>':''}</div>
      <div style="flex:1">
        <div style="font-size:13px;color:${s.done?'var(--t3)':'var(--t1)'};${s.done?'text-decoration:line-through':''}">${xe(s.title||s.text||'')}</div>
        ${s.note?`<div style="font-size:11px;color:var(--t3);margin-top:3px">${xe(s.note)}</div>`:''}
      </div>
    </div>`).join(''):''}
    ${t.notes?`<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--bd)"><div style="font-size:12px;font-weight:800;color:var(--t3);margin-bottom:8px"><i class="fa-solid fa-note-sticky"></i> ملاحظات</div><div style="font-size:13px;color:var(--t2);line-height:1.75">${xe(t.notes)}</div></div>`:''}
  </div>`;
  document.body.appendChild(ov);
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+id)?.classList.add('on');
  document.getElementById('tp-'+id)?.classList.add('on');
}

document.addEventListener('DOMContentLoaded',boot);
</script>
</body>
</html>
